name: Validate Release

on:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    name: Validate manifest version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check manifest version matches tag
        run: |
          tag=${GITHUB_REF#refs/tags/v}
          manifest=$(jq -r '.version' custom_components/schulmanager/manifest.json)
          echo "Tag version:      $tag"
          echo "Manifest version: $manifest"
          if [ "$manifest" != "$tag" ]; then
            echo "::error::Version mismatch – update manifest.json before pushing the tag"
            exit 1
          fi
          echo "Version OK: $manifest"
